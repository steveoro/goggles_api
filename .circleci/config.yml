version: 2.1
orbs:
  ruby: circleci/ruby@2.6.0

common-config: &common-config
  resource_class: large
  working_directory: ~/goggles_api
  shell: /bin/bash --login
  docker:
  - image: cimg/ruby:3.4.7-node
    environment:
      RAILS_ENV: test
      BUNDLE_JOBS: 2
      BUNDLE_RETRY: 2
      BUNDLE_PATH: vendor/bundle
      PAGER: cat
      GIT_LFS_SKIP_SMUDGE: 1
  - image: cimg/mariadb:11.4.1
    environment:
      DATABASE_NAME: goggles_test
      DATABASE_USER: root
      PAGER: cat

common-db-setup: &common-db-setup
  name: DB setup
  command: |
    sudo apt update
    sudo apt-get install mysql-client
    mkdir -p tmp ~/test-results ~/test-artifacts
    echo $RAILS_MASTER_KEY > config/master.key
    cp ./tmp/test.sql.bz2 db/dump/test.sql.bz2
    mv config/database_ci.yml config/database.yml
    dockerize -wait tcp://localhost:3306 -timeout 1m
    RAILS_ENV=test bin/rails db:rebuild from=test to=test
    RAILS_ENV=test bin/rails db:migrate

jobs:
  persisted-data:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - run:
        name: Setup persisted data
        command: |
          mkdir -p tmp
          curl -L -o ./tmp/test.sql.bz2 "https://github.com/steveoro/goggles_db/raw/rails-8.1/spec/dummy/db/dump/test.sql.bz2"
    - persist_to_workspace:
        root: tmp
        paths:
        # - cc-test-reporter
        - test.sql.bz2

  rubocop:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - checkout
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - ruby/rubocop-check:
        app-dir: ~/goggles_api
        label: Rubocop
        format: pacman

  brakeman:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - checkout
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        name: Brakeman
        command: |
          bundle exec brakeman -A6q -c .brakeman.cfg

  zeitwerk:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: Zeitwerk check
        command: |
          bundle exec rake zeitwerk:check

  rspec-A-B:
    <<: *common-config
    parallelism: 4
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - A..B
        command: |
          TEST_FILES=$(circleci tests glob "spec/api/goggles/a*_spec.rb" "spec/api/goggles/b*_spec.rb")
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
               --format RspecJunitFormatter -o ~/test-results/rspec-a-b.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results
    - store_artifacts:
        path: ~/test-artifacts

  rspec-C-F:
    <<: *common-config
    parallelism: 4
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - C..F
        command: |
          TEST_FILES=$(circleci tests glob "spec/api/goggles/c*_spec.rb" "spec/commands/*_spec.rb" "spec/api/goggles/f*_spec.rb")
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
               --format RspecJunitFormatter -o ~/test-results/rspec-c-f.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results
    - store_artifacts:
        path: ~/test-artifacts

  rspec-I:
    <<: *common-config
    parallelism: 2
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - I
        # FIXME: currently for some reason (and *only on this job*) the glob does't work and yields 0 files
        #        if I don't echo it 2 times (1st on console, 2nd in pipe):
        command: |
          TEST_FILES=$(circleci tests glob "spec/api/goggles/i*_spec.rb")
          echo "ALL I* FILES: $TEST_FILES"
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
               --format RspecJunitFormatter -o ~/test-results/rspec-i.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results
    - store_artifacts:
        path: ~/test-artifacts

  rspec-L-M:
    <<: *common-config
    parallelism: 3
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - L..M
        command: |
          TEST_FILES=$(circleci tests glob "spec/api/goggles/l*_spec.rb" "spec/api/goggles/m*_spec.rb")
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
               --format RspecJunitFormatter -o ~/test-results/rspec-l-m.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results
    - store_artifacts:
        path: ~/test-artifacts

  rspec-R-S:
    <<: *common-config
    parallelism: 3
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - R..S
        command: |
          TEST_FILES=$(circleci tests glob "spec/api/goggles/r*_spec.rb" "spec/api/goggles/s*_spec.rb")
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
               --format RspecJunitFormatter -o ~/test-results/rspec-r-s.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results
    - store_artifacts:
        path: ~/test-artifacts

  rspec-T-U:
    <<: *common-config
    parallelism: 2
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_api/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - T..U
        command: |
          TEST_FILES=$(circleci tests glob "spec/api/goggles/t*_spec.rb" "spec/api/goggles/u*_spec.rb")
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
               --format RspecJunitFormatter -o ~/test-results/rspec-t-u.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results
    - store_artifacts:
        path: ~/test-artifacts

  docker-latest:
    <<: *common-config
    steps:
    - checkout
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - setup_remote_docker:
        version: default
        docker_layer_caching: true
    - run:
        name: Docker LATEST staging
        command: |
          BRANCH_NAME="${CIRCLE_BRANCH:-}"
          if [ -z "$BRANCH_NAME" ] && [ -n "${CIRCLE_SHA1:-}" ]; then
            BRANCH_NAME=$(git branch -r --contains "$CIRCLE_SHA1" | sed 's/^[ *]*//' | grep -v 'HEAD' | head -n1 | sed 's#^origin/##')
          fi
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          SEMANTIC_VERSION=$(ruby -I. -r./lib/version -e 'print Version::SEMANTIC')
          if [ -n "$SANITIZED_BRANCH" ] && [ "$SANITIZED_BRANCH" != "master" ]; then
            DOCKER_TAG="${SEMANTIC_VERSION}.${SANITIZED_BRANCH}"
          else
            DOCKER_TAG="latest"
          fi
          echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
          docker pull $DOCKERHUB_USERNAME/goggles-api:latest
          docker build -t $DOCKERHUB_USERNAME/goggles-api:$DOCKER_TAG --cache-from=$DOCKERHUB_USERNAME/goggles-api:latest -f Dockerfile.staging .
          docker push $DOCKERHUB_USERNAME/goggles-api:$DOCKER_TAG

  docker-versioned:
    <<: *common-config
    steps:
    - checkout
    - ruby/install-deps:
        app-dir: ~/goggles_api
        key: goggles_api-v0813
    - setup_remote_docker:
        version: default
        docker_layer_caching: true
    - run:
        name: Docker TAGGED prod
        command: |
          BRANCH_NAME="${CIRCLE_BRANCH:-}"
          if [ -z "$BRANCH_NAME" ] && [ -n "${CIRCLE_SHA1:-}" ]; then
            BRANCH_NAME=$(git branch -r --contains "$CIRCLE_SHA1" | sed 's/^[ *]*//' | grep -v 'HEAD' | head -n1 | sed 's#^origin/##')
          fi
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          SEMANTIC_VERSION=$(ruby -I. -r./lib/version -e 'print Version::SEMANTIC')
          if [ -n "$SANITIZED_BRANCH" ] && [ "$SANITIZED_BRANCH" != "master" ]; then
            DOCKER_TAG="${SEMANTIC_VERSION}.${SANITIZED_BRANCH}"
          else
            DOCKER_TAG="prod-<< pipeline.git.tag >>"
          fi
          echo "Git Tag: << pipeline.git.tag >>"
          echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
          docker pull $DOCKERHUB_USERNAME/goggles-api:latest
          docker build -t $DOCKERHUB_USERNAME/goggles-api:$DOCKER_TAG --cache-from=$DOCKERHUB_USERNAME/goggles-api:latest -f Dockerfile.prod .
          docker push $DOCKERHUB_USERNAME/goggles-api:$DOCKER_TAG

workflows:
  build-docker-versioned:
    jobs:
    - persisted-data:
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - brakeman:
        requires:
        - persisted-data
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - zeitwerk:
        requires:
        - persisted-data
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - docker-versioned:
        requires:
        - brakeman
        - zeitwerk
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/

  test-and-build-latest:
    jobs:
    - persisted-data
    - brakeman:
        requires:
        - persisted-data
    - rubocop:
        requires:
        - persisted-data
    - zeitwerk:
        requires:
        - persisted-data

    - rspec-A-B:
        requires:
        - brakeman
        - rubocop
        - zeitwerk

    - rspec-C-F:
        requires:
        - brakeman
        - rubocop
        - zeitwerk

    - rspec-I:
        requires:
        - brakeman
        - rubocop
        - zeitwerk

    - rspec-L-M:
        requires:
        - rspec-A-B
    - rspec-R-S:
        requires:
        - rspec-I
    - rspec-T-U:
        requires:
        - rspec-C-F

    - docker-latest:
        requires:
        - rspec-T-U
